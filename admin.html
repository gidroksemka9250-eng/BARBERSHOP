<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Executive Dashboard | Bespoke Barbershop</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;1,600&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root { 
            --bg-base: #0a0d0b; 
            --bg-card: #111613; 
            --gold: #CBA153; 
            --text-main: #EAEAEA;
            --text-muted: #7A857D;
            --border: #2A332C;
            --approve: #1F3826;
            --reschedule: #593D22;
            --cancel: #3D1F1F;
        }
        
        body { 
            background: var(--bg-base); 
            color: var(--text-main); 
            font-family: 'Montserrat', sans-serif; 
            padding: 3rem; 
            margin: 0; 
            background-image: linear-gradient(to right, rgba(203, 161, 83, 0.02) 1px, transparent 1px),
                              linear-gradient(to bottom, rgba(203, 161, 83, 0.02) 1px, transparent 1px);
            background-size: 50px 50px;
        }
        
        h1 { 
            font-family: 'Playfair Display', serif;
            color: var(--gold); 
            border-bottom: 1px solid var(--border); 
            padding-bottom: 20px; 
            font-size: 2.2rem;
            letter-spacing: 2px;
            font-weight: 600;
        }
        
        .grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); 
            gap: 30px; 
            margin-top: 3rem; 
        }
        
        .card { 
            background: var(--bg-card); 
            border: 1px solid var(--border); 
            border-radius: 2px; 
            padding: 20px; 
            position: relative; 
            overflow: hidden; 
            transition: all 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        
        .card:hover { 
            border-color: rgba(203, 161, 83, 0.5); 
            box-shadow: 0 15px 40px rgba(0,0,0,0.7), inset 0 1px 0 rgba(203, 161, 83, 0.1); 
            transform: translateY(-5px);
        }
        
        .card img { 
            width: 100%; 
            height: 220px; 
            object-fit: cover; 
            border-radius: 2px; 
            margin-bottom: 20px; 
            background: #000; 
            filter: grayscale(20%) contrast(110%);
        }
        
        .info { 
            font-size: 0.9rem; 
            line-height: 1.8; 
            margin-bottom: 25px; 
            color: var(--text-main);
        }
        
        .info div {
            display: flex;
            justify-content: space-between;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            padding-bottom: 5px;
            margin-bottom: 8px;
        }
        
        .info span { 
            color: var(--text-muted); 
            font-weight: 400; 
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 1px;
        }
        
        .actions { display: flex; gap: 12px; }
        
        button { 
            flex: 1; 
            padding: 12px; 
            font-family: 'Montserrat', sans-serif;
            font-weight: 500; 
            border: 1px solid transparent; 
            border-radius: 2px; 
            cursor: pointer; 
            transition: all 0.3s ease; 
            text-transform: uppercase; 
            font-size: 0.7rem; 
            letter-spacing: 1px;
        }
        
        .btn-approve { background: var(--approve); color: #A8C69F; border-color: rgba(168, 198, 159, 0.2); }
        .btn-approve:hover { background: #274730; border-color: #A8C69F; }
        
        .btn-reschedule { background: var(--reschedule); color: var(--gold); border-color: rgba(203, 161, 83, 0.2); }
        .btn-reschedule:hover { background: #6E4A28; border-color: var(--gold); }
        
        .btn-cancel { background: var(--cancel); color: #C69F9F; border-color: rgba(198, 159, 159, 0.2); }
        .btn-cancel:hover { background: #4F2727; border-color: #C69F9F; }

        .empty { 
            text-align: center; 
            color: var(--text-muted); 
            font-size: 1rem; 
            font-style: italic;
            margin-top: 5rem; 
            grid-column: 1 / -1; 
            font-family: 'Playfair Display', serif;
        }
    </style>
</head>
<body>

<h1>Executive Dashboard <span>[Ожидание]</span></h1>
<div class="grid" id="requestsGrid">
    <div class="empty">Загрузка данных разведки...</div>
</div>

<script>
    async function fetchRequests() {
        try {
            const res = await fetch('/api/admin/data');
            const data = await res.json();
            const grid = document.getElementById('requestsGrid');
            
            if (data.length === 0) {
                grid.innerHTML = '<div class="empty">Досье пусты. Новых запросов не поступало.</div>';
                return;
            }

            grid.innerHTML = '';
            data.forEach(req => {
                const imgTag = req.photo ? `<img src="${req.photo}" alt="Client Photo">` : `<div style="height:220px; background:#050706; border: 1px solid var(--border); border-radius:2px; display:flex; align-items:center; justify-content:center; color:var(--text-muted); margin-bottom:20px; font-size: 0.8rem; letter-spacing: 1px; text-transform: uppercase;">Без фотофиксации</div>`;
                
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    ${imgTag}
                    <div class="info">
                        <div><span>Объект</span> ${req.address === 'address1' ? 'Grand Salon' : 'Private Lounge'}</div>
                        <div><span>Дата</span> ${req.date}</div>
                        <div><span>Время</span> ${req.time}</div>
                        <div><span>Контакт</span> ${req.phone}</div>
                    </div>
                    <div class="actions">
                        <button class="btn-approve" onclick="takeAction('${req.id}', 'approved')">Принять</button>
                        <button class="btn-reschedule" onclick="takeAction('${req.id}', 'reschedule')">Сдвинуть</button>
                        <button class="btn-cancel" onclick="takeAction('${req.id}', 'cancelled')">Отклонить</button>
                    </div>
                `;
                grid.appendChild(card);
            });
        } catch (e) {
            console.error("Failed to fetch data");
        }
    }

    async function takeAction(id, action) {
        if (!confirm(`Подтвердите директиву: ${action}?`)) return;
        
        try {
            await fetch('/api/admin/action', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ id, action })
            });
            fetchRequests(); 
        } catch (e) {
            alert("Ошибка защищенного канала при отправке директивы.");
        }
    }

    fetchRequests();
    setInterval(fetchRequests, 10000);
</script>
</body>
</html>
