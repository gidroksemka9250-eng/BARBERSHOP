<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Barbershop ADMIN</title>
    <style>
        :root { --bg: #050505; --gold: #d4af37; --card: #151515; }
        body { background: var(--bg); color: #fff; font-family: monospace; padding: 2rem; margin: 0; }
        h1 { color: var(--gold); border-bottom: 2px solid #333; padding-bottom: 10px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; margin-top: 2rem; }
        
        .card { background: var(--card); border: 1px solid #333; border-radius: 10px; padding: 15px; position: relative; overflow: hidden; transition: 0.3s; }
        .card:hover { border-color: var(--gold); box-shadow: 0 0 15px rgba(212, 175, 55, 0.2); }
        .card img { width: 100%; height: 200px; object-fit: cover; border-radius: 8px; margin-bottom: 15px; background: #000; }
        .info { font-size: 1.1rem; line-height: 1.6; margin-bottom: 15px; }
        .info span { color: var(--gold); font-weight: bold; }
        
        .actions { display: flex; gap: 10px; }
        button { flex: 1; padding: 10px; font-weight: bold; border: none; border-radius: 5px; cursor: pointer; transition: 0.2s; text-transform: uppercase; font-size: 0.8rem; }
        
        .btn-approve { background: #1b5e20; color: #fff; }
        .btn-approve:hover { background: #2e7d32; transform: translateY(-2px); }
        
        .btn-reschedule { background: #e65100; color: #fff; }
        .btn-reschedule:hover { background: #ef6c00; transform: translateY(-2px); }
        
        .btn-cancel { background: #b71c1c; color: #fff; }
        .btn-cancel:hover { background: #c62828; transform: translateY(-2px); }

        .empty { text-align: center; color: #666; font-size: 1.2rem; margin-top: 3rem; grid-column: 1 / -1; }
    </style>
</head>
<body>

<h1>Панель Управления [Ожидающие заявки]</h1>
<div class="grid" id="requestsGrid">
    <div class="empty">Загрузка данных...</div>
</div>

<script>
    async function fetchRequests() {
        try {
            const res = await fetch('/api/admin/data');
            const data = await res.json();
            const grid = document.getElementById('requestsGrid');
            
            if (data.length === 0) {
                grid.innerHTML = '<div class="empty">Новых заявок пока нет.</div>';
                return;
            }

            grid.innerHTML = '';
            data.forEach(req => {
                const imgTag = req.photo ? `<img src="${req.photo}" alt="Client Photo">` : `<div style="height:200px; background:#000; border-radius:8px; display:flex; align-items:center; justify-content:center; color:#555; margin-bottom:15px;">Фото не загружено</div>`;
                
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    ${imgTag}
                    <div class="info">
                        <div><span>Салон:</span> ${req.address === 'address1' ? 'Центральная, 1' : 'Ленина, 25'}</div>
                        <div><span>Дата:</span> ${req.date}</div>
                        <div><span>Время:</span> ${req.time}</div>
                        <div><span>Телефон:</span> ${req.phone}</div>
                    </div>
                    <div class="actions">
                        <button class="btn-approve" onclick="takeAction('${req.id}', 'approved')">Одобрить</button>
                        <button class="btn-reschedule" onclick="takeAction('${req.id}', 'reschedule')">Перенести</button>
                        <button class="btn-cancel" onclick="takeAction('${req.id}', 'cancelled')">Отменить</button>
                    </div>
                `;
                grid.appendChild(card);
            });
        } catch (e) {
            console.error("Failed to fetch data");
        }
    }

    async function takeAction(id, action) {
        if (!confirm(`Подтвердите действие: ${action}?`)) return;
        
        try {
            await fetch('/api/admin/action', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ id, action })
            });
            fetchRequests(); // Обновляем список
        } catch (e) {
            alert("Ошибка сети при отправке решения.");
        }
    }

    // Автообновление каждые 10 секунд
    fetchRequests();
    setInterval(fetchRequests, 10000);
</script>
</body>
</html>
