<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bespoke Barbershop | Premium Experience</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,900;1,400&family=Montserrat:wght@300;400;500;600;800&display=swap" rel="stylesheet">
    <style>
        :root { 
            --bg-base: #050505; 
            --bg-surface: #0a0d0b; 
            --gold: #FFD700; /* Яркий желтый для интро */
            --gold-muted: #CBA153;
            --text-main: #EAEAEA;
            --text-muted: #888888;
            --border-color: rgba(203, 161, 83, 0.2);
            --transition-smooth: all 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            background-color: var(--bg-base); 
            color: var(--text-main); 
            font-family: 'Montserrat', sans-serif;
            overflow-x: hidden;
            overflow-y: hidden; /* Изначально скрываем скролл для интро */
        }

        /* =========================================
           ИНТРО И ЭФФЕКТ ФЛЕШКИ (CS2 STYLE)
           ========================================= */
        #intro-screen {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: #000;
            z-index: 9000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: opacity 0.5s ease;
        }

        .intro-title {
            font-family: 'Playfair Display', serif;
            color: var(--gold);
            font-size: 5rem;
            font-weight: 900;
            letter-spacing: 15px;
            text-transform: uppercase;
            text-shadow: 0 0 30px rgba(255, 215, 0, 0.3);
            margin-bottom: 50px;
            animation: pulseGlow 3s infinite alternate;
            text-align: center;
        }

        .intro-btn {
            background: transparent;
            color: var(--gold);
            border: 2px solid var(--gold);
            padding: 20px 60px;
            font-size: 1.2rem;
            font-family: 'Montserrat', sans-serif;
            font-weight: 600;
            letter-spacing: 5px;
            text-transform: uppercase;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: 0.3s ease;
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.1);
        }

        .intro-btn:hover {
            background: var(--gold);
            color: #000;
            box-shadow: 0 0 40px rgba(255, 215, 0, 0.5);
            transform: scale(1.05);
        }

        #flashbang {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: #fff;
            z-index: 9999;
            opacity: 0;
            pointer-events: none;
            /* Переходы будут меняться через JS для резкой вспышки и плавного затухания */
        }

        /* =========================================
           ОСНОВНОЙ КОНТЕНТ И ГАЛЕРЕЯ
           ========================================= */
        #main-wrapper {
            opacity: 0;
            display: none;
            min-height: 100vh;
            background-image: radial-gradient(circle at 50% 0%, #17211a 0%, transparent 70%);
        }

        @keyframes pulseGlow {
            0% { text-shadow: 0 0 20px rgba(255, 215, 0, 0.2); }
            100% { text-shadow: 0 0 50px rgba(255, 215, 0, 0.6), 0 0 10px rgba(255, 255, 255, 0.5); }
        }

        @keyframes fadeUp { 
            from { opacity: 0; transform: translateY(40px); } 
            to { opacity: 1; transform: translateY(0); } 
        }

        header { 
            text-align: center; 
            padding: 4rem 1rem 2rem; 
            position: relative;
        }
        
        h1.main-title { 
            font-family: 'Playfair Display', serif;
            color: var(--gold-muted); 
            font-size: 3rem; 
            font-weight: 600;
            letter-spacing: 6px; 
            margin-bottom: 15px; 
            text-transform: uppercase;
        }
        
        .support { color: var(--text-muted); font-size: 0.85rem; letter-spacing: 2px; font-weight: 300; text-transform: uppercase; }
        .support span { color: var(--gold-muted); font-weight: 500; }

        /* Галерея */
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
            padding: 2rem 5%;
            max-width: 1400px;
            margin: 0 auto;
        }

        .gallery-item {
            position: relative;
            height: 300px;
            border-radius: 4px;
            overflow: hidden;
            cursor: pointer;
            border: 1px solid var(--border-color);
        }

        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: grayscale(80%) contrast(120%);
            transition: all 0.8s cubic-bezier(0.25, 1, 0.5, 1);
        }

        .gallery-item:hover img {
            filter: grayscale(0%) contrast(100%);
            transform: scale(1.1);
        }

        .gallery-item::after {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);
            opacity: 0.6;
            transition: 0.5s;
        }

        .gallery-item:hover::after { opacity: 0.2; }

        /* =========================================
           ФОРМА ЗАПИСИ
           ========================================= */
        .container { 
            max-width: 600px; 
            margin: 4rem auto; 
            padding: 4rem 3rem; 
            background: rgba(17, 22, 19, 0.7); 
            backdrop-filter: blur(15px);
            border-radius: 8px; 
            box-shadow: 0 30px 60px rgba(0,0,0,0.9), inset 0 1px 0 rgba(203, 161, 83, 0.1); 
            border: 1px solid var(--border-color); 
            position: relative;
        }
        
        .container::before {
            content: '';
            position: absolute;
            top: 0; left: 50%;
            transform: translateX(-50%);
            width: 60%;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--gold-muted), transparent);
        }

        .section-title {
            text-align: center;
            color: #fff;
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            margin-bottom: 2rem;
            letter-spacing: 2px;
        }
        
        .form-group { margin-bottom: 2.5rem; position: relative; }
        
        label { 
            display: block; 
            margin-bottom: 1rem; 
            color: var(--gold-muted); 
            font-weight: 500; 
            text-transform: uppercase; 
            font-size: 0.75rem; 
            letter-spacing: 3px;
        }
        
        input, select { 
            width: 100%; 
            padding: 12px 0; 
            background: transparent; 
            border: none;
            border-bottom: 1px solid rgba(255,255,255,0.1); 
            color: var(--text-main); 
            font-family: 'Montserrat', sans-serif;
            font-size: 1.1rem;
            outline: none; 
            transition: var(--transition-smooth); 
            border-radius: 0;
        }
        
        input:focus, select:focus { 
            border-bottom-color: var(--gold-muted); 
            box-shadow: 0 10px 10px -10px rgba(203, 161, 83, 0.4);
            transform: translateY(-2px);
        }
        
        select option { background: #0a0d0b; color: var(--text-main); padding: 10px; }
        
        input[type="file"] { font-size: 0.85rem; color: var(--text-muted); cursor: pointer; }
        input[type="file"]::-webkit-file-upload-button {
            background: transparent; border: 1px solid var(--gold-muted); color: var(--gold-muted);
            padding: 10px 20px; margin-right: 15px; border-radius: 2px;
            font-family: 'Montserrat', sans-serif; text-transform: uppercase; font-size: 0.75rem;
            letter-spacing: 2px; cursor: pointer; transition: var(--transition-smooth);
        }
        input[type="file"]::-webkit-file-upload-button:hover { 
            background: var(--gold-muted); 
            color: #000; 
        }
        
        button#submitBtn { 
            width: 100%; padding: 20px; margin-top: 1.5rem;
            background: linear-gradient(135deg, #CBA153 0%, #8A6D3B 100%); 
            color: #000; font-family: 'Montserrat', sans-serif;
            font-weight: 800; font-size: 1rem; letter-spacing: 4px;
            border: none; border-radius: 4px; cursor: pointer; 
            text-transform: uppercase; transition: var(--transition-smooth); 
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            position: relative;
            overflow: hidden;
        }
        
        button#submitBtn:hover { 
            transform: translateY(-3px); 
            box-shadow: 0 15px 35px rgba(203, 161, 83, 0.4); 
            filter: brightness(1.2); 
        }
        button#submitBtn:disabled { background: #333; color: #666; cursor: not-allowed; transform: none; box-shadow: none; }

        /* Стили статусов (оставлены без изменений для логики, но прокачаны визуально) */
        #statusScreen { display: none; text-align: center; padding: 2rem 0; }
        .status-icon { font-size: 4rem; margin-bottom: 1.5rem; text-shadow: 0 0 20px currentColor; animation: fadeUp 0.5s ease; }
        .status-text { font-family: 'Playfair Display', serif; font-size: 1.8rem; color: var(--gold-muted); margin-bottom: 1rem; line-height: 1.4; }
        .status-approved { color: #A8C69F; } 
        .status-cancelled { color: #C69F9F; } 
        .status-reschedule { color: var(--gold-muted); }
        
        .loader { 
            width: 60px; height: 60px; margin: 0 auto 2rem;
            border: 2px solid rgba(203, 161, 83, 0.1); 
            border-top: 2px solid var(--gold-muted); 
            border-radius: 50%; 
            animation: spin 1s cubic-bezier(0.68, -0.55, 0.265, 1.55) infinite; 
            box-shadow: 0 0 15px rgba(203, 161, 83, 0.2);
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        .reset-btn { 
            background: transparent; color: var(--text-muted); border: 1px solid var(--border-color); 
            padding: 15px 30px; font-family: 'Montserrat', sans-serif; text-transform: uppercase;
            letter-spacing: 2px; font-size: 0.8rem; cursor: pointer; transition: 0.3s; margin-top: 2.5rem;
        }
        .reset-btn:hover { background: rgba(255,255,255,0.05); color: #fff; border-color: var(--text-muted); }

        .reschedule-box {
            background: linear-gradient(180deg, rgba(203, 161, 83, 0.08) 0%, rgba(0,0,0,0) 100%);
            border: 1px solid rgba(203, 161, 83, 0.3);
            padding: 35px; 
            border-radius: 4px; 
            margin-top: 30px;
            box-shadow: inset 0 0 30px rgba(0,0,0,0.5);
        }
        .reschedule-time { 
            font-size: 2.2rem; font-weight: 600; color: #fff; margin: 20px 0; letter-spacing: 3px; 
            font-family: 'Playfair Display', serif; text-shadow: 0 0 15px rgba(203, 161, 83, 0.4);
        }
        .reschedule-actions { display: flex; gap: 20px; margin-top: 30px; }
        .btn-accept { background: #1F3826; color: #A8C69F; padding: 18px; font-size: 0.85rem; flex: 1; border: 1px solid #33593D; font-weight: 600; letter-spacing: 2px; cursor: pointer; transition: 0.3s;}
        .btn-accept:hover { background: #2F5239; box-shadow: 0 0 20px rgba(168, 198, 159, 0.3); transform: translateY(-2px);}
        .btn-reject { background: #3D1F1F; color: #C69F9F; padding: 18px; font-size: 0.85rem; flex: 1; border: 1px solid #633333; font-weight: 600; letter-spacing: 2px; cursor: pointer; transition: 0.3s;}
        .btn-reject:hover { background: #572A2A; box-shadow: 0 0 20px rgba(198, 159, 159, 0.3); transform: translateY(-2px);}

        @media (max-width: 768px) {
            .intro-title { font-size: 3rem; letter-spacing: 8px; }
            .container { padding: 3rem 2rem; margin: 2rem 1rem; }
            h1.main-title { font-size: 2.2rem; }
            .reschedule-actions { flex-direction: column; }
        }
    </style>
</head>
<body>

<div id="flashbang"></div>

<div id="intro-screen">
    <div class="intro-title">BARBERSHOP</div>
    <button class="intro-btn" id="openSiteBtn">Открыть</button>
</div>

<div id="main-wrapper">
    <header>
        <h1 class="main-title">The Gentleman</h1>
        <div class="support">Concierge: <span>@EliteArchangel</span> | +7(999) 561-45-25</div>
    </header>

    <div class="gallery">
        <div class="gallery-item"><img src="https://images.unsplash.com/photo-1585747860715-2ba37e788b70?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80" alt="Barbershop 1"></div>
        <div class="gallery-item"><img src="https://images.unsplash.com/photo-1503951914875-452162b0f3f1?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80" alt="Barbershop 2"></div>
        <div class="gallery-item"><img src="https://images.unsplash.com/photo-1599351431202-1e0f0137899a?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80" alt="Barbershop 3"></div>
        <div class="gallery-item"><img src="https://images.unsplash.com/photo-1622286342621-4bd786c2447c?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80" alt="Barbershop 4"></div>
    </div>

    <div class="container" id="appContainer">
        <form id="bookingForm">
            <div class="section-title">Оформить визит</div>
            <div class="form-group">
                <label>Апартаменты</label>
                <select id="address" required>
                    <option value="address1">Ул. Центральная, 1 (Grand Salon)</option>
                    <option value="address2">Ул. Ленина, 25 (Private Lounge)</option>
                </select>
            </div>
            <div class="form-group">
                <label>Дата визита</label>
                <input type="date" id="date" required>
            </div>
            <div class="form-group">
                <label>Время</label>
                <input type="time" id="time" required>
            </div>
            <div class="form-group">
                <label>Контактный номер</label>
                <input type="tel" id="phone" placeholder="+7 (999) 000-00-00" required>
            </div>
            <div class="form-group">
                <label>Ваше фото (Для досье)</label>
                <input type="file" id="photo" accept="image/*">
            </div>
            <button type="submit" id="submitBtn">Подтвердить визит</button>
        </form>

        <div id="statusScreen">
            <div id="statusDynamicContent">
                <div class="loader"></div>
                <p class="status-text" style="margin-top: 1rem;">Ожидание подтверждения мастером...</p>
            </div>
            <button onclick="resetBooking()" class="reset-btn" id="resetBtnContainer" style="display:none;">Новый визит</button>
        </div>
    </div>
</div>

<script>
    // =================================================================
    // ЛОГИКА ИНТЕРФЕЙСА (ИНТРО И ФЛЕШКА)
    // =================================================================
    const introScreen = document.getElementById('intro-screen');
    const flashbang = document.getElementById('flashbang');
    const mainWrapper = document.getElementById('main-wrapper');
    const openBtn = document.getElementById('openSiteBtn');

    openBtn.addEventListener('click', () => {
        // 1. Резкая белая вспышка
        flashbang.style.transition = 'opacity 0.05s ease';
        flashbang.style.opacity = '1';
        
        setTimeout(() => {
            // 2. Убираем интро, показываем основной сайт под вспышкой
            introScreen.style.display = 'none';
            mainWrapper.style.display = 'block';
            mainWrapper.style.opacity = '1';
            document.body.style.overflowY = 'auto'; // Возвращаем скролл
            
            // 3. Плавно убираем слепоту (fade-out)
            flashbang.style.transition = 'opacity 3.5s cubic-bezier(0.25, 1, 0.5, 1)';
            flashbang.style.opacity = '0';
            
            // Запускаем появление элементов сайта снизу вверх
            const galleryItems = document.querySelectorAll('.gallery-item');
            galleryItems.forEach((item, index) => {
                item.style.opacity = '0';
                item.style.animation = `fadeUp 0.8s cubic-bezier(0.25, 1, 0.5, 1) ${0.5 + (index * 0.1)}s forwards`;
            });
            document.getElementById('appContainer').style.animation = `fadeUp 1s cubic-bezier(0.25, 1, 0.5, 1) 1s forwards`;
        }, 100);
    });

    // =================================================================
    // STEALTH NET ARCHITECTURE: ANTI-CACHE & FALLBACK ROUTING
    // (Оставлено абсолютно без изменений для стабильности бэкенда)
    // =================================================================
    class StealthNet {
        static async send(url, payload) {
            const data = JSON.stringify(payload);
            const bypassUrl = url + (url.includes('?') ? '&' : '?') + '_bc=' + Date.now(); 
            try {
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 8000);
                const res = await fetch(bypassUrl, { 
                    method: 'POST', 
                    headers: { 'Content-Type': 'application/json', 'Cache-Control': 'no-cache' }, 
                    body: data, 
                    signal: controller.signal 
                });
                clearTimeout(timeoutId);
                if (res.ok) return await res.json();
                throw new Error("Fetch failed");
            } catch (err1) {
                console.warn("[StealthNet] Primary route failed, engaging XHR...");
                return new Promise((resolve, reject) => {
                    const xhr = new XMLHttpRequest();
                    xhr.open("POST", bypassUrl, true);
                    xhr.setRequestHeader("Content-Type", "application/json");
                    xhr.setRequestHeader("Cache-Control", "no-cache");
                    xhr.onload = () => {
                        if (xhr.status >= 200 && xhr.status < 300) resolve(JSON.parse(xhr.responseText));
                        else {
                            console.warn("[StealthNet] XHR failed, engaging Beacon...");
                            const blob = new Blob([data], { type: 'application/json' });
                            navigator.sendBeacon(bypassUrl, blob) ? resolve({ success: true }) : reject(new Error("Net Fail"));
                        }
                    };
                    xhr.onerror = () => reject(new Error("Net Fail"));
                    xhr.send(data);
                });
            }
        }
    }

    const form = document.getElementById('bookingForm');
    const statusScreen = document.getElementById('statusScreen');
    const statusContent = document.getElementById('statusDynamicContent');
    const resetBtn = document.getElementById('resetBtnContainer');
    let pollingInterval;

    const getBase64 = (file) => new Promise((resolve, reject) => {
        if (!file) return resolve(null);
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = () => resolve(reader.result);
        reader.onerror = error => reject(error);
    });

    window.onload = () => {
        const myId = localStorage.getItem('barber_booking_id');
        if (myId) {
            form.style.display = 'none';
            statusScreen.style.display = 'block';
            checkStatus(myId);
            pollingInterval = setInterval(() => checkStatus(myId), 5000); 
            
            // Если у чела уже есть запись, возможно стоит сразу открыть сайт
            // Раскомментируй следующие строки, если хочешь чтобы интро скипалось для тех, кто уже записан:
            // introScreen.style.display = 'none';
            // mainWrapper.style.display = 'block';
            // mainWrapper.style.opacity = '1';
            // document.body.style.overflowY = 'auto';
        }
    };

    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('submitBtn');
        btn.innerText = 'Установка соединения...';
        btn.disabled = true;

        const photoBase64 = await getBase64(document.getElementById('photo').files[0]);
        const data = {
            address: document.getElementById('address').value,
            date: document.getElementById('date').value,
            time: document.getElementById('time').value,
            phone: document.getElementById('phone').value,
            photo: photoBase64
        };

        try {
            const result = await StealthNet.send('/api/book', data);
            if (result.success) {
                localStorage.setItem('barber_booking_id', result.id);
                form.style.display = 'none';
                statusScreen.style.display = 'block';
                checkStatus(result.id);
                pollingInterval = setInterval(() => checkStatus(result.id), 5000);
                
                // Плавный скролл к статусу
                document.getElementById('appContainer').scrollIntoView({ behavior: 'smooth' });
            }
        } catch (err) {
            alert('Сбой связи. Резервный канал активирован, попробуйте позже.');
        } finally {
            btn.innerText = 'Подтвердить визит';
            btn.disabled = false;
        }
    });

    async function checkStatus(id) {
        try {
            const bypassUrl = `/api/status/${id}?_bc=${Date.now()}`;
            const res = await fetch(bypassUrl, { headers: { 'Cache-Control': 'no-cache, no-store' } });
            const data = await res.json();
            
            if (data.status === 'approved') {
                statusContent.innerHTML = `<div class="status-icon" style="color: #A8C69F;">✧</div><p class="status-text status-approved">Визит подтвержден.<br>Ожидаем вас.</p>`;
                resetBtn.style.display = 'inline-block';
                clearInterval(pollingInterval);
            } else if (data.status === 'cancelled') {
                statusContent.innerHTML = `<div class="status-icon" style="color: #C69F9F;">✕</div><p class="status-text status-cancelled">Визит отменен.<br>Запись не состоялась.</p>`;
                resetBtn.style.display = 'inline-block';
                clearInterval(pollingInterval);
            } else if (data.status === 'reschedule') {
                clearInterval(pollingInterval); 
                resetBtn.style.display = 'none'; 
                
                statusContent.innerHTML = `
                    <div class="status-icon" style="color: #CBA153;">⟲</div>
                    <p class="status-text status-reschedule">Мастер предложил<br>альтернативное время</p>
                    <div class="reschedule-box">
                        <div style="font-size: 0.75rem; color: var(--gold-muted); text-transform: uppercase; letter-spacing: 2px;">Новая дата визита:</div>
                        <div class="reschedule-time">${data.proposedDate}<br>${data.proposedTime}</div>
                        <div class="reschedule-actions">
                            <button class="btn-accept" onclick="clientDecision('${id}', 'accept')">ПРИНЯТЬ ВРЕМЯ</button>
                            <button class="btn-reject" onclick="clientDecision('${id}', 'reject')">ОТКЛОНИТЬ</button>
                        </div>
                    </div>
                `;
            }
        } catch (e) { 
            console.log('[POLLING] Network shadow timeout, retrying...'); 
        }
    }

    async function clientDecision(id, action) {
        try {
            statusContent.innerHTML = `<div class="loader"></div><p class="status-text">Синхронизация с сервером...</p>`;
            await StealthNet.send('/api/client/action', { id, action });
            
            checkStatus(id);
            pollingInterval = setInterval(() => checkStatus(id), 5000);
        } catch (e) {
            alert('Сбой защищенной сети. Попробуйте еще раз.');
            checkStatus(id); 
        }
    }

    function resetBooking() {
        localStorage.removeItem('barber_booking_id');
        clearInterval(pollingInterval);
        statusScreen.style.display = 'none';
        form.style.display = 'block';
        resetBtn.style.display = 'none';
        statusContent.innerHTML = `<div class="loader"></div><p class="status-text" style="margin-top: 1rem;">Ожидание подтверждения мастером...</p>`;
    }
</script>
</body>
</html>
