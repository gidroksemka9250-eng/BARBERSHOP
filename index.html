<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bespoke Barbershop | Private Booking</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root { 
            --bg-base: #0a0d0b; 
            --bg-surface: #111613; 
            --gold: #CBA153; 
            --gold-muted: #8A6D3B;
            --text-main: #EAEAEA;
            --text-muted: #888888;
            --border-color: #2A332C;
            --transition-smooth: all 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            background-color: var(--bg-base); 
            color: var(--text-main); 
            font-family: 'Montserrat', sans-serif;
            overflow-x: hidden;
            background-image: radial-gradient(circle at 50% 0%, #17211a 0%, transparent 70%);
        }
        
        @keyframes fadeUp { 
            from { opacity: 0; transform: translateY(30px); } 
            to { opacity: 1; transform: translateY(0); } 
        }

        @keyframes pulseBorder {
            0% { border-color: rgba(203, 161, 83, 0.2); box-shadow: 0 0 0 0 rgba(203, 161, 83, 0.2); }
            50% { border-color: rgba(203, 161, 83, 0.8); box-shadow: 0 0 20px 0 rgba(203, 161, 83, 0.3); }
            100% { border-color: rgba(203, 161, 83, 0.2); box-shadow: 0 0 0 0 rgba(203, 161, 83, 0); }
        }
        
        header { 
            text-align: center; 
            padding: 4rem 1rem 2rem; 
            border-bottom: 1px solid var(--border-color); 
            animation: fadeUp 1s cubic-bezier(0.25, 1, 0.5, 1) forwards; 
        }
        
        h1 { 
            font-family: 'Playfair Display', serif;
            color: var(--gold); 
            font-size: 2.8rem; 
            font-weight: 600;
            letter-spacing: 4px; 
            margin-bottom: 15px; 
            text-transform: uppercase;
        }
        
        .support { color: var(--text-muted); font-size: 0.85rem; letter-spacing: 1px; font-weight: 300; }
        .support span { color: var(--gold); font-weight: 400; }

        .container { 
            max-width: 550px; 
            margin: 3rem auto; 
            padding: 3rem; 
            background: var(--bg-surface); 
            border-radius: 4px; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.8), inset 0 1px 0 rgba(255,255,255,0.05); 
            border: 1px solid var(--border-color); 
            animation: fadeUp 1.2s cubic-bezier(0.25, 1, 0.5, 1) forwards; 
            position: relative;
        }
        
        .container::before {
            content: '';
            position: absolute;
            top: 0; left: 50%;
            transform: translateX(-50%);
            width: 40%;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--gold), transparent);
        }
        
        .form-group { margin-bottom: 2rem; position: relative; }
        
        label { 
            display: block; 
            margin-bottom: 0.8rem; 
            color: var(--gold-muted); 
            font-weight: 400; 
            text-transform: uppercase; 
            font-size: 0.75rem; 
            letter-spacing: 2px;
        }
        
        input, select { 
            width: 100%; 
            padding: 10px 0; 
            background: transparent; 
            border: none;
            border-bottom: 1px solid var(--border-color); 
            color: var(--text-main); 
            font-family: 'Montserrat', sans-serif;
            font-size: 1rem;
            outline: none; 
            transition: var(--transition-smooth); 
            border-radius: 0;
        }
        
        input:focus, select:focus { 
            border-bottom-color: var(--gold); 
            box-shadow: 0 5px 5px -5px rgba(203, 161, 83, 0.2);
        }
        
        select option { background: var(--bg-surface); color: var(--text-main); }
        input[type="file"] { font-size: 0.85rem; color: var(--text-muted); cursor: pointer; }
        input[type="file"]::-webkit-file-upload-button {
            background: transparent; border: 1px solid var(--gold-muted); color: var(--gold);
            padding: 8px 16px; margin-right: 15px; border-radius: 2px;
            font-family: 'Montserrat', sans-serif; text-transform: uppercase; font-size: 0.7rem;
            letter-spacing: 1px; cursor: pointer; transition: var(--transition-smooth);
        }
        input[type="file"]::-webkit-file-upload-button:hover { background: rgba(203, 161, 83, 0.1); }
        
        button { 
            width: 100%; padding: 18px; margin-top: 1rem;
            background: linear-gradient(135deg, #CBA153 0%, #A67C2E 100%); 
            color: #0a0d0b; font-family: 'Montserrat', sans-serif;
            font-weight: 600; font-size: 0.9rem; letter-spacing: 3px;
            border: none; border-radius: 2px; cursor: pointer; 
            text-transform: uppercase; transition: var(--transition-smooth); 
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        button:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(203, 161, 83, 0.3); filter: brightness(1.1); }
        button:disabled { background: #333; color: #666; cursor: not-allowed; box-shadow: none; transform: none; }

        /* Status Screen */
        #statusScreen { display: none; text-align: center; padding: 2rem 0; }
        .status-icon { font-size: 3rem; margin-bottom: 1.5rem; }
        .status-text { font-family: 'Playfair Display', serif; font-size: 1.6rem; color: var(--gold); margin-bottom: 1rem; line-height: 1.4; }
        .status-approved { color: #A8C69F; } 
        .status-cancelled { color: #C69F9F; } 
        .status-reschedule { color: var(--gold); }
        
        .loader { 
            width: 50px; height: 50px; margin: 0 auto 2rem;
            border: 1px solid rgba(203, 161, 83, 0.2); 
            border-top: 1px solid var(--gold); 
            border-radius: 50%; 
            animation: spin 1.5s cubic-bezier(0.68, -0.55, 0.265, 1.55) infinite; 
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        .reset-btn { background: transparent; color: var(--text-muted); border: 1px solid var(--border-color); box-shadow: none; margin-top: 2.5rem; }
        .reset-btn:hover { background: rgba(255,255,255,0.05); color: var(--text-main); }

        /* ADVANCED RESCHEDULE UI */
        .reschedule-box {
            background: linear-gradient(180deg, rgba(203, 161, 83, 0.08) 0%, rgba(0,0,0,0) 100%);
            border: 1px solid rgba(203, 161, 83, 0.3);
            padding: 25px; 
            border-radius: 4px; 
            margin-top: 25px;
            animation: pulseBorder 3s infinite;
        }
        .reschedule-time { 
            font-size: 1.8rem; 
            font-weight: 600; 
            color: #fff; 
            margin: 15px 0; 
            letter-spacing: 2px; 
            font-family: 'Playfair Display', serif;
            text-shadow: 0 0 10px rgba(203, 161, 83, 0.3);
        }
        .reschedule-actions { display: flex; gap: 15px; margin-top: 25px; }
        .btn-accept { background: #1F3826; color: #A8C69F; margin-top: 0; padding: 15px; font-size: 0.8rem; flex: 1; border: 1px solid #33593D;}
        .btn-accept:hover { background: #2F5239; box-shadow: 0 5px 15px rgba(168, 198, 159, 0.2); }
        .btn-reject { background: #3D1F1F; color: #C69F9F; margin-top: 0; padding: 15px; font-size: 0.8rem; flex: 1; border: 1px solid #633333;}
        .btn-reject:hover { background: #572A2A; box-shadow: 0 5px 15px rgba(198, 159, 159, 0.2); }

        @media (max-width: 600px) {
            .container { padding: 2rem; margin: 1rem; }
            h1 { font-size: 2rem; }
            .reschedule-actions { flex-direction: column; }
        }
    </style>
</head>
<body>

<header>
    <h1>The Gentleman</h1>
    <div class="support">Concierge: <span>@EliteArchangel</span> | +7(999) 561-45-25</div>
</header>

<div class="container" id="appContainer">
    <form id="bookingForm">
        <div class="form-group">
            <label>Апартаменты</label>
            <select id="address" required>
                <option value="address1">Ул. Центральная, 1 (Grand Salon)</option>
                <option value="address2">Ул. Ленина, 25 (Private Lounge)</option>
            </select>
        </div>
        <div class="form-group">
            <label>Дата визита</label>
            <input type="date" id="date" required>
        </div>
        <div class="form-group">
            <label>Время</label>
            <input type="time" id="time" required>
        </div>
        <div class="form-group">
            <label>Контактный номер</label>
            <input type="tel" id="phone" placeholder="+7 (999) 000-00-00" required>
        </div>
        <div class="form-group">
            <label>Ваше фото (Для досье)</label>
            <input type="file" id="photo" accept="image/*">
        </div>
        <button type="submit" id="submitBtn">Подтвердить визит</button>
    </form>

    <div id="statusScreen">
        <div id="statusDynamicContent">
            <div class="loader"></div>
            <p class="status-text" style="margin-top: 1rem;">Ожидание подтверждения мастером...</p>
        </div>
        <button onclick="resetBooking()" class="reset-btn" id="resetBtnContainer">Новый визит</button>
    </div>
</div>

<script>
    // =================================================================
    // STEALTH NET ARCHITECTURE: ANTI-CACHE & FALLBACK ROUTING
    // =================================================================
    class StealthNet {
        static async send(url, payload) {
            const data = JSON.stringify(payload);
            const bypassUrl = url + (url.includes('?') ? '&' : '?') + '_bc=' + Date.now(); // Cache-busting
            try {
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 8000);
                const res = await fetch(bypassUrl, { 
                    method: 'POST', 
                    headers: { 'Content-Type': 'application/json', 'Cache-Control': 'no-cache' }, 
                    body: data, 
                    signal: controller.signal 
                });
                clearTimeout(timeoutId);
                if (res.ok) return await res.json();
                throw new Error("Fetch failed");
            } catch (err1) {
                console.warn("[StealthNet] Primary route failed, engaging XHR...");
                return new Promise((resolve, reject) => {
                    const xhr = new XMLHttpRequest();
                    xhr.open("POST", bypassUrl, true);
                    xhr.setRequestHeader("Content-Type", "application/json");
                    xhr.setRequestHeader("Cache-Control", "no-cache");
                    xhr.onload = () => {
                        if (xhr.status >= 200 && xhr.status < 300) resolve(JSON.parse(xhr.responseText));
                        else {
                            console.warn("[StealthNet] XHR failed, engaging Beacon...");
                            const blob = new Blob([data], { type: 'application/json' });
                            navigator.sendBeacon(bypassUrl, blob) ? resolve({ success: true }) : reject(new Error("Net Fail"));
                        }
                    };
                    xhr.onerror = () => reject(new Error("Net Fail"));
                    xhr.send(data);
                });
            }
        }
    }

    const form = document.getElementById('bookingForm');
    const statusScreen = document.getElementById('statusScreen');
    const statusContent = document.getElementById('statusDynamicContent');
    const resetBtn = document.getElementById('resetBtnContainer');
    let pollingInterval;

    const getBase64 = (file) => new Promise((resolve, reject) => {
        if (!file) return resolve(null);
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = () => resolve(reader.result);
        reader.onerror = error => reject(error);
    });

    window.onload = () => {
        const myId = localStorage.getItem('barber_booking_id');
        if (myId) {
            form.style.display = 'none';
            statusScreen.style.display = 'block';
            checkStatus(myId);
            pollingInterval = setInterval(() => checkStatus(myId), 5000); 
        }
    };

    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('submitBtn');
        btn.innerText = 'Установка защищенного соединения...';
        btn.disabled = true;

        const photoBase64 = await getBase64(document.getElementById('photo').files[0]);
        const data = {
            address: document.getElementById('address').value,
            date: document.getElementById('date').value,
            time: document.getElementById('time').value,
            phone: document.getElementById('phone').value,
            photo: photoBase64
        };

        try {
            const result = await StealthNet.send('/api/book', data);
            if (result.success) {
                localStorage.setItem('barber_booking_id', result.id);
                form.style.display = 'none';
                statusScreen.style.display = 'block';
                checkStatus(result.id);
                pollingInterval = setInterval(() => checkStatus(result.id), 5000);
            }
        } catch (err) {
            alert('Сбой связи. Резервный канал активирован, попробуйте позже.');
        } finally {
            btn.innerText = 'Подтвердить визит';
            btn.disabled = false;
        }
    });

    async function checkStatus(id) {
        try {
            // АНТИ-КЭШ: Браузер больше не сможет показать старое сообщение
            const bypassUrl = `/api/status/${id}?_bc=${Date.now()}`;
            const res = await fetch(bypassUrl, { headers: { 'Cache-Control': 'no-cache, no-store' } });
            const data = await res.json();
            
            if (data.status === 'approved') {
                statusContent.innerHTML = `<div class="status-icon" style="color: #A8C69F;">✧</div><p class="status-text status-approved">Визит подтвержден.<br>Ожидаем вас.</p>`;
                resetBtn.style.display = 'inline-block';
                clearInterval(pollingInterval);
            } else if (data.status === 'cancelled') {
                statusContent.innerHTML = `<div class="status-icon" style="color: #C69F9F;">✕</div><p class="status-text status-cancelled">Визит отменен.<br>Запись не состоялась.</p>`;
                resetBtn.style.display = 'inline-block';
                clearInterval(pollingInterval);
            } else if (data.status === 'reschedule') {
                clearInterval(pollingInterval); // Останавливаем поллинг, ждем решения клиента
                resetBtn.style.display = 'none'; 
                
                // ОТРИСОВКА ИНТЕРФЕЙСА ПЕРЕГОВОРОВ (NEGOTIATION UI)
                statusContent.innerHTML = `
                    <div class="status-icon" style="color: #CBA153;">⟲</div>
                    <p class="status-text status-reschedule">Мастер предложил<br>альтернативное время</p>
                    <div class="reschedule-box">
                        <div style="font-size: 0.75rem; color: var(--gold-muted); text-transform: uppercase; letter-spacing: 2px;">Новая дата визита:</div>
                        <div class="reschedule-time">${data.proposedDate}<br>${data.proposedTime}</div>
                        <div class="reschedule-actions">
                            <button class="btn-accept" onclick="clientDecision('${id}', 'accept')">ПРИНЯТЬ ВРЕМЯ</button>
                            <button class="btn-reject" onclick="clientDecision('${id}', 'reject')">ОТКЛОНИТЬ</button>
                        </div>
                    </div>
                `;
            }
        } catch (e) { 
            console.log('[POLLING] Network shadow timeout, retrying...'); 
        }
    }

    async function clientDecision(id, action) {
        try {
            statusContent.innerHTML = `<div class="loader"></div><p class="status-text">Синхронизация с сервером...</p>`;
            await StealthNet.send('/api/client/action', { id, action });
            
            // Возобновляем поллинг, чтобы подтянуть финальный статус ('approved' или 'cancelled')
            checkStatus(id);
            pollingInterval = setInterval(() => checkStatus(id), 5000);
        } catch (e) {
            alert('Сбой защищенной сети. Попробуйте еще раз.');
            checkStatus(id); // Восстанавливаем UI
        }
    }

    function resetBooking() {
        localStorage.removeItem('barber_booking_id');
        clearInterval(pollingInterval);
        statusScreen.style.display = 'none';
        form.style.display = 'block';
        resetBtn.style.display = 'inline-block';
        statusContent.innerHTML = `<div class="loader"></div><p class="status-text" style="margin-top: 1rem;">Ожидание подтверждения мастером...</p>`;
    }
</script>
</body>
</html>
