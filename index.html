<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Barbershop - Premium</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        /* Базовые настройки */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Montserrat', sans-serif;
        }

        body {
            background-color: #0f0f0f;
            color: #fff;
            overflow: hidden; /* Блокируем скролл во время интро */
        }

        /* --- ИНТРО --- */
        #intro-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: #000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            transition: opacity 0.5s ease;
        }

        #intro-screen h1 {
            color: #ffd700;
            font-size: 5rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 10px;
            margin-bottom: 50px;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
            animation: textFocus 2s cubic-bezier(0.25, 0.46, 0.45, 0.94) both;
        }

        .open-btn {
            background: transparent;
            color: #ffd700;
            border: 2px solid #ffd700;
            padding: 15px 50px;
            font-size: 1.5rem;
            font-weight: 700;
            text-transform: uppercase;
            cursor: pointer;
            border-radius: 5px;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            animation: slideUpFade 1s 1s both;
        }

        .open-btn:hover {
            background: #ffd700;
            color: #000;
            box-shadow: 0 0 30px #ffd700;
            transform: scale(1.05);
        }

        /* --- ЭФФЕКТ ФЛЕШКИ CS2 --- */
        #flashbang {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: #fff;
            z-index: 9999;
            opacity: 0;
            pointer-events: none; /* Чтобы не мешал кликать после затухания */
        }

        .flash-active {
            opacity: 1 !important;
        }

        .flash-fade {
            transition: opacity 4s cubic-bezier(0.1, 0.7, 0.1, 1);
            opacity: 0 !important;
        }

        /* --- ГЛАВНЫЙ САЙТ --- */
        #main-site {
            display: none; /* Скрыт до нажатия */
            padding: 40px 20px 100px 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }

        .gallery-item {
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            opacity: 0;
            transform: translateY(50px);
            transition: all 0.5s ease;
        }

        .gallery-item img {
            width: 100%;
            height: 300px;
            object-fit: cover;
            display: block;
            transition: transform 0.8s ease;
        }

        .gallery-item:hover img {
            transform: scale(1.1);
        }

        /* Анимация появления контента */
        .show-item {
            opacity: 1;
            transform: translateY(0);
        }

        /* --- КНОПКА ЗАПИСИ --- */
        .book-now-container {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 50;
        }

        .book-btn {
            background: linear-gradient(45deg, #ffd700, #ffaa00);
            color: #000;
            border: none;
            padding: 20px 60px;
            font-size: 1.5rem;
            font-weight: 900;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.6);
            animation: pulseGlow 2s infinite;
            text-transform: uppercase;
            transition: transform 0.2s ease;
        }

        .book-btn:active {
            transform: scale(0.95);
        }

        /* --- KEYFRAMES --- */
        @keyframes textFocus {
            0% { filter: blur(12px); opacity: 0; transform: scale(1.2); }
            100% { filter: blur(0); opacity: 1; transform: scale(1); }
        }

        @keyframes slideUpFade {
            0% { opacity: 0; transform: translateY(30px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        @keyframes pulseGlow {
            0% { box-shadow: 0 0 20px rgba(255, 215, 0, 0.4); }
            50% { box-shadow: 0 0 40px rgba(255, 215, 0, 0.8), 0 0 10px rgba(255, 215, 0, 0.5) inset; }
            100% { box-shadow: 0 0 20px rgba(255, 215, 0, 0.4); }
        }

        @media (max-width: 768px) {
            #intro-screen h1 { font-size: 3rem; }
        }
    </style>
</head>
<body>

    <div id="flashbang"></div>

    <div id="intro-screen">
        <h1>Barbershop</h1>
        <button class="open-btn" id="openBtn">Открыть</button>
    </div>

    <div id="main-site">
        <h2 style="text-align: center; font-size: 2.5rem; margin-bottom: 20px; color: #ffd700;">Наши работы</h2>
        
        <div class="gallery">
            <div class="gallery-item"><img src="https://images.unsplash.com/photo-1585747860715-2ba37e788b70?q=80&w=800&auto=format&fit=crop" alt="Barber 1"></div>
            <div class="gallery-item"><img src="https://images.unsplash.com/photo-1503951914875-452162b0f3f1?q=80&w=800&auto=format&fit=crop" alt="Barber 2"></div>
            <div class="gallery-item"><img src="https://images.unsplash.com/photo-1599351431202-1e0f0137899a?q=80&w=800&auto=format&fit=crop" alt="Barber 3"></div>
            <div class="gallery-item"><img src="https://images.unsplash.com/photo-1512496015851-a1c84cb15b94?q=80&w=800&auto=format&fit=crop" alt="Barber 4"></div>
            <div class="gallery-item"><img src="https://images.unsplash.com/photo-1621605815971-fbc98d665033?q=80&w=800&auto=format&fit=crop" alt="Barber 5"></div>
            <div class="gallery-item"><img src="https://images.unsplash.com/photo-1521590832167-7bfc17454f54?q=80&w=800&auto=format&fit=crop" alt="Barber 6"></div>
        </div>

        <div class="book-now-container">
            <button class="book-btn">Запись</button>
        </div>
    </div>

    <script>
        document.getElementById('openBtn').addEventListener('click', function() {
            const flashbang = document.getElementById('flashbang');
            const intro = document.getElementById('intro-screen');
            const mainSite = document.getElementById('main-site');
            
            // 1. Моментальная вспышка
            flashbang.classList.add('flash-active');
            
            setTimeout(() => {
                // 2. Прячем интро, показываем сайт, возвращаем скролл
                intro.style.display = 'none';
                mainSite.style.display = 'block';
                document.body.style.overflow = 'auto';
                
                // 3. Запускаем долгое затухание вспышки (как в CS2)
                flashbang.classList.remove('flash-active');
                flashbang.classList.add('flash-fade');
                
                // 4. Красиво выводим карточки с задержкой
                const items = document.querySelectorAll('.gallery-item');
                items.forEach((item, index) => {
                    setTimeout(() => {
                        item.classList.add('show-item');
                    }, 500 + (index * 150)); // Каждая картинка появляется с микро-задержкой
                });

            }, 100); // 100мс держим фулл белый экран
        });
    </script>

</body>
</html>
