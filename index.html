<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bespoke Barbershop | Private Booking</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root { 
            --bg-base: #0a0d0b; 
            --bg-surface: #111613; /* Deep British Racing Green */
            --gold: #CBA153; 
            --gold-muted: #8A6D3B;
            --text-main: #EAEAEA;
            --text-muted: #888888;
            --border-color: #2A332C;
            --transition-smooth: all 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            background-color: var(--bg-base); 
            color: var(--text-main); 
            font-family: 'Montserrat', sans-serif;
            overflow-x: hidden;
            background-image: radial-gradient(circle at 50% 0%, #17211a 0%, transparent 70%);
        }
        
        /* Elegant Animations */
        @keyframes fadeUp { 
            from { opacity: 0; transform: translateY(30px); } 
            to { opacity: 1; transform: translateY(0); } 
        }
        @keyframes shimmer { 
            0% { background-position: -200% center; } 
            100% { background-position: 200% center; } 
        }
        
        header { 
            text-align: center; 
            padding: 4rem 1rem 2rem; 
            border-bottom: 1px solid var(--border-color); 
            animation: fadeUp 1s cubic-bezier(0.25, 1, 0.5, 1) forwards; 
        }
        
        h1 { 
            font-family: 'Playfair Display', serif;
            color: var(--gold); 
            font-size: 2.8rem; 
            font-weight: 600;
            letter-spacing: 4px; 
            margin-bottom: 15px; 
            text-transform: uppercase;
        }
        
        .support { 
            color: var(--text-muted); 
            font-size: 0.85rem; 
            letter-spacing: 1px;
            font-weight: 300;
        }
        .support span { color: var(--gold); font-weight: 400; }

        .container { 
            max-width: 550px; 
            margin: 3rem auto; 
            padding: 3rem; 
            background: var(--bg-surface); 
            border-radius: 4px; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.8), inset 0 1px 0 rgba(255,255,255,0.05); 
            border: 1px solid var(--border-color); 
            animation: fadeUp 1.2s cubic-bezier(0.25, 1, 0.5, 1) forwards; 
            position: relative;
        }
        
        /* Ornamental top line */
        .container::before {
            content: '';
            position: absolute;
            top: 0; left: 50%;
            transform: translateX(-50%);
            width: 40%;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--gold), transparent);
        }
        
        .form-group { margin-bottom: 2rem; position: relative; }
        
        label { 
            display: block; 
            margin-bottom: 0.8rem; 
            color: var(--gold-muted); 
            font-weight: 400; 
            text-transform: uppercase; 
            font-size: 0.75rem; 
            letter-spacing: 2px;
        }
        
        input, select { 
            width: 100%; 
            padding: 10px 0; 
            background: transparent; 
            border: none;
            border-bottom: 1px solid var(--border-color); 
            color: var(--text-main); 
            font-family: 'Montserrat', sans-serif;
            font-size: 1rem;
            outline: none; 
            transition: var(--transition-smooth); 
            border-radius: 0;
        }
        
        input:focus, select:focus { 
            border-bottom-color: var(--gold); 
            box-shadow: 0 5px 5px -5px rgba(203, 161, 83, 0.2);
        }
        
        select option { background: var(--bg-surface); color: var(--text-main); }
        input[type="file"] { font-size: 0.85rem; color: var(--text-muted); cursor: pointer; }
        input[type="file"]::-webkit-file-upload-button {
            background: transparent;
            border: 1px solid var(--gold-muted);
            color: var(--gold);
            padding: 8px 16px;
            margin-right: 15px;
            border-radius: 2px;
            font-family: 'Montserrat', sans-serif;
            text-transform: uppercase;
            font-size: 0.7rem;
            letter-spacing: 1px;
            cursor: pointer;
            transition: var(--transition-smooth);
        }
        input[type="file"]::-webkit-file-upload-button:hover { background: rgba(203, 161, 83, 0.1); }
        
        button { 
            width: 100%; 
            padding: 18px; 
            margin-top: 1rem;
            background: linear-gradient(135deg, #CBA153 0%, #A67C2E 100%); 
            color: #0a0d0b; 
            font-family: 'Montserrat', sans-serif;
            font-weight: 500; 
            font-size: 0.9rem; 
            letter-spacing: 3px;
            border: none; 
            border-radius: 2px; 
            cursor: pointer; 
            text-transform: uppercase; 
            transition: var(--transition-smooth); 
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        
        button:hover { 
            transform: translateY(-2px); 
            box-shadow: 0 8px 25px rgba(203, 161, 83, 0.3); 
            filter: brightness(1.1);
        }
        
        button:disabled { background: #333; color: #666; cursor: not-allowed; box-shadow: none; transform: none; }

        /* Status Screen */
        #statusScreen { display: none; text-align: center; padding: 2rem 0; }
        .status-icon { font-size: 3rem; margin-bottom: 1.5rem; }
        .status-text { font-family: 'Playfair Display', serif; font-size: 1.6rem; color: var(--gold); margin-bottom: 1rem; line-height: 1.4; }
        .status-approved { color: #A8C69F; } /* Elegant muted green */
        .status-cancelled { color: #C69F9F; } /* Elegant muted red */
        .status-reschedule { color: var(--gold); }
        
        .loader { 
            width: 50px; 
            height: 50px; 
            margin: 0 auto 2rem;
            border: 1px solid rgba(203, 161, 83, 0.2); 
            border-top: 1px solid var(--gold); 
            border-radius: 50%; 
            animation: spin 1.5s cubic-bezier(0.68, -0.55, 0.265, 1.55) infinite; 
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        .reset-btn {
            background: transparent;
            color: var(--text-muted);
            border: 1px solid var(--border-color);
            box-shadow: none;
            margin-top: 2.5rem;
        }
        .reset-btn:hover { background: rgba(255,255,255,0.05); color: var(--text-main); }
        
        @media (max-width: 600px) {
            .container { padding: 2rem; margin: 1rem; }
            h1 { font-size: 2rem; }
        }
    </style>
</head>
<body>

<header>
    <h1>The Gentleman</h1>
    <div class="support">Concierge: <span>@EliteArchangel</span> | +7(999) 561-45-25</div>
</header>

<div class="container" id="appContainer">
    <form id="bookingForm">
        <div class="form-group">
            <label>Апартаменты</label>
            <select id="address" required>
                <option value="address1">Ул. Центральная, 1 (Grand Salon)</option>
                <option value="address2">Ул. Ленина, 25 (Private Lounge)</option>
            </select>
        </div>
        <div class="form-group">
            <label>Дата визита</label>
            <input type="date" id="date" required>
        </div>
        <div class="form-group">
            <label>Время</label>
            <input type="time" id="time" required>
        </div>
        <div class="form-group">
            <label>Контактный номер</label>
            <input type="tel" id="phone" placeholder="+7 (999) 000-00-00" required>
        </div>
        <div class="form-group">
            <label>Ваше фото (Для досье)</label>
            <input type="file" id="photo" accept="image/*">
        </div>
        <button type="submit" id="submitBtn">Подтвердить визит</button>
    </form>

    <div id="statusScreen">
        <div id="statusDynamicContent">
            <div class="loader"></div>
            <p class="status-text" style="margin-top: 1rem;">Ожидание подтверждения мастером...</p>
        </div>
        <button onclick="resetBooking()" class="reset-btn">Новый визит</button>
    </div>
</div>

<script>
    const form = document.getElementById('bookingForm');
    const statusScreen = document.getElementById('statusScreen');
    const statusContent = document.getElementById('statusDynamicContent');
    let pollingInterval;

    const getBase64 = (file) => new Promise((resolve, reject) => {
        if (!file) return resolve(null);
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = () => resolve(reader.result);
        reader.onerror = error => reject(error);
    });

    window.onload = () => {
        const myId = localStorage.getItem('barber_booking_id');
        if (myId) {
            form.style.display = 'none';
            statusScreen.style.display = 'block';
            checkStatus(myId);
            pollingInterval = setInterval(() => checkStatus(myId), 5000); 
        }
    };

    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('submitBtn');
        btn.innerText = 'Авторизация...';
        btn.disabled = true;

        const photoFile = document.getElementById('photo').files[0];
        const photoBase64 = await getBase64(photoFile);

        const data = {
            address: document.getElementById('address').value,
            date: document.getElementById('date').value,
            time: document.getElementById('time').value,
            phone: document.getElementById('phone').value,
            photo: photoBase64
        };

        try {
            const res = await fetch('/api/book', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            const result = await res.json();
            
            if (result.success) {
                localStorage.setItem('barber_booking_id', result.id);
                form.style.display = 'none';
                statusScreen.style.display = 'block';
                checkStatus(result.id);
                pollingInterval = setInterval(() => checkStatus(result.id), 5000);
            }
        } catch (err) {
            alert('Сбой связи. Резервный канал активирован, попробуйте позже.');
        } finally {
            btn.innerText = 'Подтвердить визит';
            btn.disabled = false;
        }
    });

    async function checkStatus(id) {
        try {
            const res = await fetch(`/api/status/${id}`);
            const data = await res.json();
            
            if (data.status === 'approved') {
                statusContent.innerHTML = `<div class="status-icon" style="color: #A8C69F;">✧</div><p class="status-text status-approved">Визит подтвержден.<br>Ожидаем вас.</p>`;
                clearInterval(pollingInterval);
            } else if (data.status === 'cancelled') {
                statusContent.innerHTML = `<div class="status-icon" style="color: #C69F9F;">✕</div><p class="status-text status-cancelled">Визит отклонен.<br>Время недоступно.</p>`;
                clearInterval(pollingInterval);
            } else if (data.status === 'reschedule') {
                statusContent.innerHTML = `<div class="status-icon" style="color: #CBA153;">⟲</div><p class="status-text status-reschedule">Корректировка времени.<br>Консьерж свяжется с вами.</p>`;
                clearInterval(pollingInterval);
            }
        } catch (e) { console.log('Ожидание сервера...'); }
    }

    function resetBooking() {
        localStorage.removeItem('barber_booking_id');
        clearInterval(pollingInterval);
        statusScreen.style.display = 'none';
        form.style.display = 'block';
        statusContent.innerHTML = `<div class="loader"></div><p class="status-text" style="margin-top: 1rem;">Ожидание подтверждения мастером...</p>`;
    }
</script>
</body>
</html>
