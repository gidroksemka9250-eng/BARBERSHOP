<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite Archangel | Premium Barbershop</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,900;1,600&family=Montserrat:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <style>
        /* =========================================
           БАЗОВЫЕ НАСТРОЙКИ И ПЕРЕМЕННЫЕ
        ========================================= */
        :root {
            --gold: #CBA153;
            --gold-bright: #FFD700;
            --bg-dark: #050706;
            --bg-card: rgba(17, 22, 19, 0.7);
            --text-main: #EAEAEA;
            --text-muted: #7A857D;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Montserrat', sans-serif;
            overflow: hidden; /* Блок скролла для интро */
            -webkit-font-smoothing: antialiased;
        }

        /* Кастомный скроллбар */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-dark); }
        ::-webkit-scrollbar-thumb { background: var(--gold); border-radius: 10px; }

        /* =========================================
           ИНТРО (ЭКРАН ЗАГРУЗКИ)
        ========================================= */
        #intro-screen {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            background: radial-gradient(circle at center, #111 0%, #000 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            transition: opacity 0.5s ease;
        }

        #intro-screen h1 {
            font-family: 'Playfair Display', serif;
            color: var(--gold-bright);
            font-size: clamp(3rem, 8vw, 6rem);
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 12px;
            margin-bottom: 40px;
            text-shadow: 0 0 30px rgba(255, 215, 0, 0.4);
            animation: cinematicFocus 2.5s cubic-bezier(0.25, 0.46, 0.45, 0.94) both;
            text-align: center;
        }

        .open-btn {
            background: transparent;
            color: var(--gold-bright);
            border: 1px solid var(--gold-bright);
            padding: 16px 60px;
            font-size: 1.2rem;
            font-family: 'Montserrat', sans-serif;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 4px;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: all 0.4s ease;
            animation: slideUpFade 1s 1.5s both;
        }

        .open-btn::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,215,0,0.4), transparent);
            transition: all 0.5s ease;
        }

        .open-btn:hover {
            background: var(--gold-bright);
            color: #000;
            box-shadow: 0 0 40px rgba(255, 215, 0, 0.6);
            transform: translateY(-3px);
        }

        .open-btn:hover::before { left: 100%; transition: 0.5s; }

        /* =========================================
           ЭФФЕКТ ФЛЕШКИ CS2
        ========================================= */
        #flashbang {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            background-color: #ffffff;
            z-index: 9999;
            opacity: 0;
            pointer-events: none;
        }

        .flash-active { opacity: 1 !important; box-shadow: inset 0 0 100px #fff; }
        .flash-fade {
            transition: opacity 4s cubic-bezier(0.1, 0.9, 0.2, 1);
            opacity: 0 !important;
        }

        /* =========================================
           ОСНОВНОЙ САЙТ
        ========================================= */
        #main-site {
            display: none;
            padding: 60px 20px 120px 20px;
            max-width: 1400px;
            margin: 0 auto;
            position: relative;
        }

        .site-header {
            text-align: center;
            margin-bottom: 60px;
            animation: slideDownFade 1s ease forwards;
            opacity: 0;
        }

        .site-header h2 {
            font-family: 'Playfair Display', serif;
            font-size: 3rem;
            color: var(--gold);
            letter-spacing: 2px;
        }

        .site-header p {
            color: var(--text-muted);
            margin-top: 10px;
            font-size: 1rem;
            letter-spacing: 5px;
            text-transform: uppercase;
        }

        /* ГАЛЕРЕЯ */
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 30px;
        }

        .gallery-item {
            position: relative;
            border-radius: 4px;
            overflow: hidden;
            opacity: 0;
            transform: translateY(50px);
            transition: all 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            cursor: pointer;
        }

        .gallery-item::after {
            content: '';
            position: absolute;
            inset: 0;
            border: 1px solid rgba(203, 161, 83, 0);
            transition: border 0.5s ease;
            z-index: 2;
        }

        .gallery-item img {
            width: 100%;
            height: 400px;
            object-fit: cover;
            display: block;
            filter: grayscale(80%) brightness(0.7);
            transition: all 0.8s ease;
        }

        .gallery-item:hover::after { border: 1px solid rgba(203, 161, 83, 0.5); }
        .gallery-item:hover img {
            filter: grayscale(0%) brightness(1.1);
            transform: scale(1.08);
        }

        .show-item { opacity: 1; transform: translateY(0); }

        /* =========================================
           КНОПКА ЗАПИСИ (ПЛАВАЮЩАЯ)
        ========================================= */
        .book-now-container {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 50;
            opacity: 0;
            animation: fadeInBtn 1s 2s forwards;
        }

        .book-btn {
            background: rgba(20, 20, 20, 0.8);
            backdrop-filter: blur(10px);
            color: var(--gold);
            border: 1px solid var(--gold);
            padding: 20px 70px;
            font-size: 1.2rem;
            font-family: 'Montserrat', sans-serif;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 3px;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8), inset 0 0 20px rgba(203,161,83,0.1);
            transition: all 0.3s ease;
            border-radius: 2px;
        }

        .book-btn:hover {
            background: var(--gold);
            color: #000;
            box-shadow: 0 0 30px rgba(203, 161, 83, 0.6);
            transform: scale(1.05);
        }

        /* =========================================
           МОДАЛЬНОЕ ОКНО БРОНИРОВАНИЯ
        ========================================= */
        .modal-overlay {
            display: none;
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(8px);
            z-index: 1000;
            justify-content: center; align-items: center;
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        .modal-active { display: flex; opacity: 1; }

        .modal-content {
            background: var(--bg-card);
            border: 1px solid var(--gold);
            padding: 40px;
            width: 90%; max-width: 500px;
            border-radius: 2px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.9);
            position: relative;
            transform: translateY(30px);
            transition: transform 0.4s ease;
        }

        .modal-active .modal-content { transform: translateY(0); }

        .modal-title {
            font-family: 'Playfair Display', serif;
            color: var(--gold);
            font-size: 2rem;
            margin-bottom: 25px;
            text-align: center;
        }

        .form-group { margin-bottom: 20px; }
        .form-group label {
            display: block;
            font-size: 0.75rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }

        .modal-input {
            width: 100%; padding: 12px;
            background: rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.1);
            color: var(--text-main);
            font-family: 'Montserrat', sans-serif;
            outline: none; transition: 0.3s;
            border-radius: 2px;
        }

        .modal-input:focus { border-color: var(--gold); background: rgba(0,0,0,0.8); }
        input[type="file"] { padding: 8px; font-size: 0.8rem; }

        .modal-actions { display: flex; gap: 15px; margin-top: 30px; }
        .modal-btn {
            flex: 1; padding: 15px; border: none; font-weight: 600; cursor: pointer;
            text-transform: uppercase; letter-spacing: 1px; transition: 0.3s;
        }
        
        .btn-submit { background: var(--gold); color: #000; }
        .btn-submit:hover { box-shadow: 0 0 20px rgba(203,161,83,0.5); }
        .btn-close { background: transparent; color: var(--text-muted); border: 1px solid rgba(255,255,255,0.1); }
        .btn-close:hover { border-color: #fff; color: #fff; }

        /* =========================================
           АНИМАЦИИ (KEYFRAMES)
        ========================================= */
        @keyframes cinematicFocus {
            0% { filter: blur(20px); opacity: 0; transform: scale(1.1); letter-spacing: 20px; }
            100% { filter: blur(0); opacity: 1; transform: scale(1); letter-spacing: 12px; }
        }
        @keyframes slideUpFade {
            0% { opacity: 0; transform: translateY(40px); }
            100% { opacity: 1; transform: translateY(0); }
        }
        @keyframes slideDownFade {
            0% { opacity: 0; transform: translateY(-30px); }
            100% { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeInBtn {
            0% { opacity: 0; transform: translate(-50%, 20px); }
            100% { opacity: 1; transform: translate(-50%, 0); }
        }

        @media (max-width: 768px) {
            #intro-screen h1 { letter-spacing: 6px; }
            @keyframes cinematicFocus {
                100% { letter-spacing: 6px; }
            }
            .modal-content { padding: 25px; }
        }
    </style>
</head>
<body>

    <div id="flashbang"></div>

    <div id="intro-screen">
        <h1>Barbershop</h1>
        <button class="open-btn" id="openBtn">Открыть сайт</button>
    </div>

    <div id="main-site">
        <div class="site-header" id="site-header">
            <h2>Наши Работы</h2>
            <p>Искусство Мужского Стиля</p>
        </div>
        
        <div class="gallery">
            <div class="gallery-item"><img src="https://images.unsplash.com/photo-1585747860715-2ba37e788b70?q=80&w=800&auto=format&fit=crop" alt="Work 1"></div>
            <div class="gallery-item"><img src="https://images.unsplash.com/photo-1503951914875-452162b0f3f1?q=80&w=800&auto=format&fit=crop" alt="Work 2"></div>
            <div class="gallery-item"><img src="https://images.unsplash.com/photo-1599351431202-1e0f0137899a?q=80&w=800&auto=format&fit=crop" alt="Work 3"></div>
            <div class="gallery-item"><img src="https://images.unsplash.com/photo-1512496015851-a1c84cb15b94?q=80&w=800&auto=format&fit=crop" alt="Work 4"></div>
            <div class="gallery-item"><img src="https://images.unsplash.com/photo-1621605815971-fbc98d665033?q=80&w=800&auto=format&fit=crop" alt="Work 5"></div>
            <div class="gallery-item"><img src="https://images.unsplash.com/photo-1521590832167-7bfc17454f54?q=80&w=800&auto=format&fit=crop" alt="Work 6"></div>
        </div>

        <div class="book-now-container">
            <button class="book-btn" id="openModalBtn">Записаться</button>
        </div>
    </div>

    <div class="modal-overlay" id="bookingModal">
        <div class="modal-content">
            <div class="modal-title">Визит</div>
            
            <div class="form-group">
                <label>Выберите филиал</label>
                <select class="modal-input" id="bookAddress">
                    <option value="address1">Grand Salon (Адрес 1)</option>
                    <option value="address2">Private Lounge (Адрес 2)</option>
                </select>
            </div>
            
            <div style="display:flex; gap:15px;">
                <div class="form-group" style="flex:1;">
                    <label>Дата</label>
                    <input type="date" class="modal-input" id="bookDate">
                </div>
                <div class="form-group" style="flex:1;">
                    <label>Время</label>
                    <input type="time" class="modal-input" id="bookTime">
                </div>
            </div>

            <div class="form-group">
                <label>Телефон</label>
                <input type="tel" class="modal-input" id="bookPhone" placeholder="+7 (999) 000-00-00">
            </div>

            <div class="form-group">
                <label>Фото для барбера (Опционально)</label>
                <input type="file" class="modal-input" id="bookPhoto" accept="image/*">
            </div>

            <div class="modal-actions">
                <button class="modal-btn btn-close" id="closeModalBtn">Отмена</button>
                <button class="modal-btn btn-submit" id="submitBookingBtn">Отправить</button>
            </div>
        </div>
    </div>

    <script>
        // --- 1. ЭФФЕКТ ФЛЕШКИ И ПЕРЕХОД ---
        document.getElementById('openBtn').addEventListener('click', function() {
            const flashbang = document.getElementById('flashbang');
            const intro = document.getElementById('intro-screen');
            const mainSite = document.getElementById('main-site');
            
            // Моментальная ослепляющая вспышка
            flashbang.classList.add('flash-active');
            
            setTimeout(() => {
                // Переключаем экраны под белым фоном
                intro.style.display = 'none';
                mainSite.style.display = 'block';
                document.body.style.overflow = 'auto'; // Возвращаем скролл
                
                // Начинаем долгое затухание (fade-out)
                flashbang.classList.remove('flash-active');
                flashbang.classList.add('flash-fade');
                
                // Запускаем появление заголовка
                document.getElementById('site-header').style.opacity = '1';

                // Красивый каскадный выход картинок
                const items = document.querySelectorAll('.gallery-item');
                items.forEach((item, index) => {
                    setTimeout(() => {
                        item.classList.add('show-item');
                    }, 400 + (index * 150));
                });

            }, 150); // Держим фулл-белый экран 150мс
        });

        // --- 2. ЛОГИКА МОДАЛЬНОГО ОКНА ---
        const modal = document.getElementById('bookingModal');
        const openModalBtn = document.getElementById('openModalBtn');
        const closeModalBtn = document.getElementById('closeModalBtn');
        const submitBtn = document.getElementById('submitBookingBtn');

        openModalBtn.addEventListener('click', () => {
            modal.classList.add('modal-active');
            // Ставим сегодняшнюю дату по умолчанию
            document.getElementById('bookDate').value = new Date().toISOString().split('T')[0];
        });

        closeModalBtn.addEventListener('click', () => {
            modal.classList.remove('modal-active');
        });

        // --- 3. ОТПРАВКА ДАННЫХ НА SERVER.JS ---
        submitBtn.addEventListener('click', async () => {
            const address = document.getElementById('bookAddress').value;
            const date = document.getElementById('bookDate').value;
            const time = document.getElementById('bookTime').value;
            const phone = document.getElementById('bookPhone').value;
            const photoInput = document.getElementById('bookPhoto');

            if (!date || !time || !phone) {
                alert("Пожалуйста, заполните дату, время и телефон.");
                return;
            }

            submitBtn.innerText = 'ОТПРАВКА...';
            submitBtn.style.pointerEvents = 'none';

            let photoBase64 = null;
            
            // Если прикреплено фото - конвертируем в Base64 для сервера
            if (photoInput.files && photoInput.files[0]) {
                const file = photoInput.files[0];
                photoBase64 = await new Promise((resolve) => {
                    const reader = new FileReader();
                    reader.onloadend = () => resolve(reader.result);
                    reader.readAsDataURL(file);
                });
            }

            const payload = { address, date, time, phone, photo: photoBase64 };

            try {
                // Вызов API твоего сервера
                const response = await fetch('/api/book', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const result = await response.json();

                if (result.success) {
                    alert('Заявка успешно отправлена! Ожидайте подтверждения.');
                    modal.classList.remove('modal-active');
                    // Очистка формы
                    document.getElementById('bookPhone').value = '';
                    document.getElementById('bookPhoto').value = '';
                } else {
                    alert('Ошибка сервера. Попробуйте еще раз.');
                }
            } catch (err) {
                console.error('API Error:', err);
                alert('Не удалось связаться с сервером. Проверьте соединение.');
            } finally {
                submitBtn.innerText = 'ОТПРАВИТЬ';
                submitBtn.style.pointerEvents = 'auto';
            }
        });
    </script>
</body>
</html>
